<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Finder Pro</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #eef3fb, #f8fbff);
        font-family: Inter, Arial, sans-serif;
        color: #243450;
      }

      .card {
        width: min(520px, calc(100vw - 48px));
        padding: 32px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid #d8e1ee;
        box-shadow: 0 24px 60px rgba(37, 55, 88, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        line-height: 1.05;
      }

      p {
        margin: 0;
        font-size: 16px;
        line-height: 1.7;
        color: #55657f;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Agent Finder Pro is offline</h1>
      <p>The desktop app could not reach the live workspace. Check your internet connection and open the app again.</p>
    </div>
  </body>
</html>
